version: '3.9'

services:
  backend:
    build:
      context: ./backend
    image: renefondufe/zuri-backend:latest
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
    volumes:
      - ./backend/src:/usr/src/app/src
      - ./backend/.env.example:/usr/src/app/.env

  frontend:
    build:
      context: ./frontend
    image: renefondufe/zuri-frontend:latest
    ports:
      - '3000:80'
    depends_on:
      - backend
